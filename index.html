<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Role-Based SPA</title>
</head>
<body>

  <h1>Role-Based SPA</h1>

  <div id="message"></div>

  <!-- AUTH SECTION -->
  <div id="auth-section">

    <h2>Login</h2>
    <form id="login-form">
      <input id="login-username" type="text" placeholder="Username" required />
      <input id="login-password" type="password" placeholder="Password" required />
      <button type="submit">Log In</button>
    </form>

    <h2>Register</h2>
    <form id="register-form">
      <input id="reg-username" type="text" placeholder="Username" required />
      <input id="reg-password" type="password" placeholder="Password" required />
      <button type="submit">Register</button>
    </form>

  </div>

  <!-- DASHBOARD SECTION -->
  <div id="dashboard-section" style="display:none;">

    <p>Logged in as: <strong id="username-display"></strong></p>
    <p>Role: <strong id="role-display"></strong></p>

    <div id="content"></div>

    <button id="profileBtn">My Profile</button>
    <button id="guestBtn">Guest Content</button>
    <button id="adminBtn">Admin Dashboard</button>
    <button id="logoutBtn">Log Out</button>

  </div>

  <script src="app.js"></script>
</body>
</html>
